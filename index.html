<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quarto Visual Editor</title>
    <script>
        // Polyfill for typo-js and other libs that detect extensions but crash when getURL is missing
        if (window.chrome && window.chrome.runtime && !window.chrome.runtime.getURL) {
            window.chrome.runtime.getURL = function (path) { return path; };
        }
        if (window.browser && window.browser.runtime && !window.browser.runtime.getURL) {
            window.browser.runtime.getURL = function (path) { return path; };
        }
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
</body>

</html>
